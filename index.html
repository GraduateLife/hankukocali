<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한국어 캘리 - Korean Handwriting Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="header">
    <button id="menu-btn" title="Menu">&#9776;</button>
    <span id="level-label">Level 1</span>
    <span id="progress">1 / 14</span>
    <button id="guide-toggle" title="Toggle guide">&#128065;</button>
  </header>

  <main id="canvas-container">
    <canvas id="drawing-canvas"></canvas>
    <div id="notification" class="hidden"></div>
  </main>

  <div id="stroke-row">
    <label id="stroke-label" for="stroke-slider">画笔: <span id="stroke-value">24</span>px</label>
    <input type="range" id="stroke-slider" min="4" max="40" value="24" step="2">
  </div>

  <div id="button-row">
    <button id="btn-clear" class="btn">清除</button>
    <button id="btn-calibrate" class="btn btn-calibrate hidden">自动校准</button>
    <button id="btn-submit" class="btn btn-primary">提交</button>
  </div>

  <footer id="romanization-bar">
    <div id="roman-label">Pronunciation</div>
    <div id="roman-text">g / k</div>
  </footer>

  <!-- Menu overlay -->
  <div id="menu-overlay" class="hidden">
    <div id="menu-panel">
      <div id="menu-header">
        <h2>Menu</h2>
        <button id="menu-close">&#10005;</button>
      </div>
      <div id="menu-tabs">
        <button class="menu-tab active" data-tab="gallery">Gallery</button>
        <button class="menu-tab" data-tab="settings">Settings</button>
      </div>
      <div id="menu-content">
        <div id="gallery-view"></div>
        <div id="settings-view" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/state.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/recognition.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
